<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garden Planner Roadmap</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --p:#fff;--s:#f5f4f0;--t:#eceae3;
  --tp:#1a1a18;--ts:#5f5e5a;--tt:#888780;
  --b1:rgba(0,0,0,0.12);--b2:rgba(0,0,0,0.22);
  --gn:#3B6D11;--gnb:#EAF3DE;--gnt:#27500A;
}
@media(prefers-color-scheme:dark){
  :root{
    --p:#1e1e1b;--s:#272724;--t:#141412;
    --tp:#e8e6df;--ts:#b4b2a9;--tt:#686763;
    --b1:rgba(255,255,255,0.1);--b2:rgba(255,255,255,0.18);
    --gn:#7abd3e;--gnb:#1a2e08;--gnt:#c0dd97;
  }
}
html,body{min-height:100%}
body{font-family:system-ui,-apple-system,sans-serif;font-size:16px;background:var(--t);color:var(--tp);padding:1.5rem 1rem 3rem}
.wrap{max-width:820px;margin:0 auto}
h1{font-size:22px;font-weight:500;margin-bottom:.3rem;color:var(--tp)}
.subtitle{font-size:14px;color:var(--ts);margin-bottom:1.5rem;line-height:1.6}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1.5rem}
.leg{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ts)}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.phase{border:1px solid var(--b1);border-radius:12px;margin-bottom:.85rem;overflow:hidden;background:var(--p)}
.phase-header{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;user-select:none;background:var(--s)}
.phase-header:hover{background:var(--t)}
.badge{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0}
.phase-title{font-size:15px;font-weight:500;flex:1;color:var(--tp)}
.phase-meta{font-size:12px;color:var(--tt);white-space:nowrap;margin-left:auto}
.chevron{font-size:11px;color:var(--tt);transition:transform .2s;margin-left:8px;flex-shrink:0}
.phase.open .chevron{transform:rotate(180deg)}
.phase-body{display:none;padding:16px 18px;border-top:1px solid var(--b1)}
.phase.open .phase-body{display:block}
.dep{font-size:12px;color:var(--tt);margin-bottom:10px;padding:7px 10px;border-left:3px solid var(--b2);background:var(--s);border-radius:0 6px 6px 0}
.sec-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--tt);margin:14px 0 7px}
.sec-label:first-child{margin-top:0}
.tasks{display:flex;flex-direction:column;gap:6px}
.task{display:flex;gap:10px;align-items:flex-start;padding:9px 12px;border-radius:8px;background:var(--p);border:1px solid var(--b1);font-size:13px;line-height:1.5}
.task-icon{flex-shrink:0;margin-top:2px;color:var(--tt);font-size:15px}
.task-main{color:var(--tp)}
.task-sub{color:var(--ts);font-size:12px;margin-top:3px;line-height:1.55}
.tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;margin-left:6px;vertical-align:middle;font-weight:500}
.tn{background:#EAF3DE;color:#27500A}
.td{background:#E6F1FB;color:#0C447C}
.ta{background:#FAEEDA;color:#633806}
.tu{background:#EEEDFE;color:#3C3489}
.ts_{background:#FCEBEB;color:#791F1F}
.tk{background:#E1F5EE;color:#085041}
@media(prefers-color-scheme:dark){
.tn{background:#1a2e08;color:#c0dd97}
.td{background:#06192e;color:#85B7EB}
.ta{background:#2a1d06;color:#FAC775}
.tu{background:#1e1c3a;color:#AFA9EC}
.ts_{background:#250909;color:#F09595}
.tk{background:#04342C;color:#9FE1CB}
}
.new-pill{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:2px 9px;border-radius:10px;background:#EAF3DE;color:#27500A;margin-left:8px;vertical-align:middle}
@media(prefers-color-scheme:dark){.new-pill{background:#1a2e08;color:#c0dd97}}
.done-pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:2px 9px;border-radius:10px;background:#E1F5EE;color:#085041;margin-left:8px;vertical-align:middle}
@media(prefers-color-scheme:dark){.done-pill{background:#04342C;color:#9FE1CB}}
.phase.done .phase-header{opacity:.75}
.phase.done .phase-body{opacity:.8}
.complexity{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--ts);margin-top:11px;padding:5px 11px;border-radius:6px;background:var(--s)}
.cdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
</style>
</head>
<body>
<div class="wrap">
  <h1>Garden Planner — Full Roadmap</h1>

    <span class="leg"><span class="leg-dot" style="background:#A32D2D"></span>Security rules</span>
    <span class="leg"><span class="leg-dot" style="background:#0F6E56"></span>Data / schema</span>
  </div>
  <div id="phases"></div>
</div>

  {l:'Firestore security rules update — critical',tasks:[
   {i:'ti-shield-lock',t:'Viewers: read if uid in resource.data.sharedWith with role viewer or editor',g:['s']},
   {i:'ti-edit',t:'Editors: write if uid in resource.data.sharedWith and role editor',g:['s']},
   {i:'ti-crown',t:'Owner (uid === resource.data.ownerId) retains full control including delete and share settings',g:['s']},
   {i:'ti-alert-triangle',t:'Test all rule combinations before deploying — use Firebase Rules Playground',g:['s']},
  ]},
  {l:'Sharing UI',tasks:[
   {i:'ti-settings',t:'Garden settings panel: manage sharedWith list, set role per collaborator',g:['u','n']},
   {i:'ti-users',t:'Real-time collaboration via onSnapshot — changes from any editor appear instantly',g:['u','n']},
   {i:'ti-eye',t:'Viewer sees read-only grid with all three overlay modes available',s:'Companion, planting, and harvest overlays all work for shared viewers — draw/erase tools hidden',g:['u']},
  ]},
 ]},
];

const TM={n:'tn',d:'td',a:'ta',u:'tu',s:'ts_',k:'tk'};
const TL={n:'New',d:'Firestore',a:'Auth',u:'UI',s:'Security',k:'Schema'};
const CL=['Low','Medium','High'];
const CC=['#639922','#BA7517','#A32D2D'];

function tags(g){return(g||[]).map(x=>`<span class="tag ${TM[x]||''}">${TL[x]||x}</span>`).join('');}

const wrap=document.getElementById('phases');
PHASES.forEach((p,i)=>{
  const el=document.createElement('div');
  el.className='phase'+(i===0?' open':'')+(p.isDone?' done':'');
  el.innerHTML=`
<div class="phase-header" onclick="this.parentElement.classList.toggle('open')">
  <span class="badge" style="background:${p.bg};color:${p.color}">${p.isDone?'✓':p.id}</span>
  <span class="phase-title">${p.title}${p.isNew?'<span class="new-pill">New</span>':''}${p.isDone?'<span class="done-pill">✓ Complete</span>':''}</span>
  <span class="phase-meta">${p.meta}</span>
  <span class="chevron">&#9660;</span>
</div>
<div class="phase-body">
  ${p.dep?`<div class="dep">&#8627; ${p.dep}</div>`:''}
  ${p.sections.map(s=>`
    <div class="sec-label">${s.l}</div>
    <div class="tasks">${s.tasks.map(t=>`
      <div class="task">
        <i class="ti ${t.i} task-icon" aria-hidden="true"></i>
        <div>
          <div class="task-main">${t.t}${tags(t.g)}</div>
          ${t.s?`<div class="task-sub">${t.s}</div>`:''}
        </div>
      </div>`).join('')}
    </div>`).join('')}
  <div class="complexity"><span class="cdot" style="background:${CC[p.complexity-1]}"></span>${CL[p.complexity-1]} complexity</div>
</div>`;
  wrap.appendChild(el);
});
</script>
</body>
</html>
