
<style>
*{box-sizing:border-box;margin:0;padding:0}

.wrap{padding:1rem 0}
.topbar{display:flex;gap:8px;margin-bottom:1rem;align-items:center;flex-wrap:wrap}

.pcard-name{font-size:13px;font-weight:500;margin-bottom:2px}
.pcard-cat{font-size:11px;color:var(--color-text-tertiary);margin-bottom:8px}
.pcard-tags{display:flex;gap:4px;flex-wrap:wrap}
.tag{font-size:10px;padding:2px 7px;border-radius:10px}
.ts{background:#FAEEDA;color:#633806}
.tw{background:#E6F1FB;color:#042C53}
.pcard-actions{display:flex;gap:5px;margin-top:10px}
.pcard-actions button{flex:1;padding:4px 0;font-size:11px;cursor:pointer;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-secondary)}

.del-btn{color:var(--color-text-danger) !important;border-color:var(--color-border-danger) !important}

.ph-title{font-size:18px;font-weight:500}
.ph-sub{font-size:12px;color:var(--color-text-secondary);margin-top:2px}

.stab{padding:7px 13px;font-size:12px;cursor:pointer;border-bottom:2px solid transparent;color:var(--color-text-secondary);margin-bottom:-1px;white-space:nowrap}

.tc{display:none}.tc.on{display:block}
.igrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin-bottom:1rem}
.icard{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px}
.ilabel{font-size:11px;color:var(--color-text-tertiary);margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em}
.ival{font-size:12px;font-weight:500;line-height:1.4}
.sh{font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.05em;margin:1rem 0 .4rem}
.cpill{font-size:11px;padding:3px 9px;border-radius:10px;display:inline-block;margin:2px}
.gpill{background:#EAF3DE;color:#27500A}
.rpill{background:#FCEBEB;color:#791F1F}
.ditem{padding:9px 11px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);margin-bottom:7px}

.ddesc{font-size:11px;color:var(--color-text-secondary);line-height:1.5}
.stagelist{list-style:none}

.stitle{font-size:12px;font-weight:500}
.sdesc{font-size:11px;color:var(--color-text-secondary);margin-top:2px;line-height:1.5}
.abox{padding:9px 11px;border-radius:var(--border-radius-md);margin-bottom:7px;font-size:12px;line-height:1.5;border:0.5px solid}

.awarn{background:#FAEEDA;border-color:#BA7517;color:#633806}

.backbtn{background:none;border:0.5px solid var(--color-border-secondary);padding:5px 13px;border-radius:var(--border-radius-md);cursor:pointer;font-size:12px;color:var(--color-text-secondary);margin-bottom:1rem}

.frow{margin-bottom:.85rem}

.frow input,.frow textarea,.frow select{width:100%;font-size:13px}
.frow textarea{resize:vertical;min-height:60px}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.factions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;padding-top:1rem;border-top:0.5px solid var(--color-border-tertiary)}

.save-btn{background:#3B6D11;color:#EAF3DE;border-color:#3B6D11 !important}
.save-btn:hover{background:#27500A}
.cancel-btn{background:var(--color-background-primary);color:var(--color-text-secondary)}
.ph-bar-vis{height:16px;border-radius:3px;background:linear-gradient(to right,#d32f2f,#f57c00,#fbc02d,#689f38,#2e7d32,#1565c0);position:relative;margin:6px 0 3px}
.ph-marker-vis{position:absolute;top:-3px;width:10px;height:22px;background:var(--color-text-primary);border-radius:2px;transform:translateX(-50%);opacity:.75}
.ph-labels-vis{display:flex;justify-content:space-between;font-size:10px;color:var(--color-text-tertiary)}
.wdrop{width:14px;height:14px;border-radius:50% 50% 50% 0;background:#B5D4F4;transform:rotate(-45deg);display:inline-block;margin:1px}
.wdrop.f{background:#185FA5}
.count-badge{position:absolute;top:8px;right:8px;background:var(--color-background-secondary);border-radius:10px;font-size:10px;padding:1px 6px;color:var(--color-text-tertiary)}
.tab-edit-hint{font-size:11px;color:var(--color-text-tertiary);margin-bottom:.75rem;display:flex;align-items:center;gap:5px}
.pencil-icon{width:12px;height:12px;display:inline-block;vertical-align:middle}
.stage-edit-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:8px}
.stage-edit-row input{flex:1}
.stage-edit-row textarea{flex:2;min-height:44px;resize:vertical;font-size:12px}
.rm-btn{padding:4px 8px;font-size:11px;color:var(--color-text-danger);border:0.5px solid var(--color-border-danger);border-radius:var(--border-radius-md);cursor:pointer;background:none;flex-shrink:0}
.add-row-btn{font-size:11px;padding:5px 12px;cursor:pointer;border:0.5px dashed var(--color-border-secondary);border-radius:var(--border-radius-md);background:none;color:var(--color-text-secondary);width:100%;margin-top:4px}
.add-row-btn:hover{background:var(--color-background-secondary)}
.section-divider{border:none;border-top:0.5px solid var(--color-border-tertiary);margin:1rem 0}
.no-res{text-align:center;padding:2.5rem;color:var(--color-text-secondary);font-size:13px}
</style>

let activeFilter="All", currentPlantId=null, editingPlant=null, isNew=false;

function getCategories(){return["All",...new Set(PLANTS.map(p=>p.cat))]}

function renderCatRow(){
  const cats=getCategories();
  document.getElementById("cat-row").innerHTML=cats.map(c=>`<button class="cbtn${c===activeFilter?' on':''}" onclick="setFilter('${c}')">${c}</button>`).join("");
}

function setFilter(cat){activeFilter=cat;renderCatRow();renderGrid();}

function renderGrid(){
  const q=(document.getElementById("search")||{}).value?.toLowerCase()||"";
  const filtered=PLANTS.filter(p=>{
    const mc=activeFilter==="All"||p.cat===activeFilter;
    const ms=!q||p.name.toLowerCase().includes(q)||p.cat.toLowerCase().includes(q);
    return mc&&ms;
  });
  const grid=document.getElementById("plant-grid");
  if(!filtered.length){grid.innerHTML='<div class="no-res">No plants found</div>';return;}
  grid.innerHTML=filtered.map(p=>`
    <div class="pcard">
      <span class="count-badge">${p.cat}</span>
      <div class="pcard-name" style="margin-top:4px">${p.emoji} ${p.name}</div>
      <div class="pcard-tags" style="margin-top:6px">
        <span class="tag ts">${p.planting.sun.split(" ").slice(0,2).join(" ")}</span>
        <span class="tag tw">${p.water.in} in/wk</span>
      </div>
      <div class="pcard-actions">
        <button onclick="showDetail('${p.id}')">View</button>
        <button onclick="openEdit('${p.id}')">Edit</button>
        <button class="del-btn" onclick="deletePlant('${p.id}')">Delete</button>
      </div>
    </div>
  `).join("");
}

function phBar(ph){
  const parts=ph.split("–").map(Number);
  const mid=(parts[0]+parts[1])/2;
  const pct=Math.round(((mid-4)/(9-4))*100);
  return `<div class="ph-bar-vis"><div class="ph-marker-vis" style="left:${pct}%"></div></div>
<div class="ph-labels-vis"><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span></div>
<div style="font-size:11px;color:var(--color-text-secondary);margin-top:4px">Ideal: ${ph}</div>`;
}

function waterVis(w){
  const n=parseFloat(w)||1;
  const full=Math.floor(n);
  const half=(n-full)>=0.25;
  let h='<div style="display:flex;gap:3px;margin:5px 0;flex-wrap:wrap">';
  for(let i=0;i<full;i++)h+='<div class="wdrop f"></div>';
  if(half)h+='<div class="wdrop" style="opacity:.45"></div>';
  return h+'</div>';
}

function showDetail(id){
  const p=PLANTS.find(x=>x.id===id);if(!p)return;
  currentPlantId=id;
  document.getElementById("list-view").style.display="none";
  document.getElementById("detail-view").style.display="block";
  document.getElementById("detail-content").innerHTML=buildDetail(p);
  showTab("planting");
}

function showList(){
  document.getElementById("list-view").style.display="block";
  document.getElementById("detail-view").style.display="none";
  document.getElementById("edit-modal").style.display="none";
}

function showTab(tab){
  document.querySelectorAll(".stab").forEach(t=>t.classList.toggle("on",t.dataset.tab===tab));
  document.querySelectorAll(".tc").forEach(c=>c.classList.toggle("on",c.id==="tc-"+tab));
}

  </div>
</div>`;
}

function deletePlant(id){
  const p=PLANTS.find(x=>x.id===id);
  if(!p)return;
  if(!confirm(`Delete "${p.name}"? This cannot be undone.`))return;
  PLANTS=PLANTS.filter(x=>x.id!==id);
  renderCatRow();renderGrid();
  if(currentPlantId===id)showList();
}

function openEdit(id){
  const p=PLANTS.find(x=>x.id===id);if(!p)return;
  editingPlant=JSON.parse(JSON.stringify(p));
  isNew=false;
  renderModal();
  document.getElementById("list-view").style.display="none";
  document.getElementById("detail-view").style.display="none";
  document.getElementById("edit-modal").style.display="block";
}

function openAdd(){
  editingPlant=DEFAULT_PLANT();
  isNew=true;
  renderModal();
  document.getElementById("list-view").style.display="none";
  document.getElementById("detail-view").style.display="none";
  document.getElementById("edit-modal").style.display="block";
}

function renderModal(){
  const p=editingPlant;
  const title=isNew?"Add new crop":`Edit: ${p.name}`;
  document.getElementById("modal-inner").innerHTML=`
<h3>${title}</h3>

<div class="frow">
  <label>Crop name</label>
  <input id="f-name" value="${esc(p.name)}" placeholder="e.g. Broccoli" oninput="editingPlant.name=this.value">
</div>
<div class="fgrid">
  <div class="frow">
    <label>Category</label>
    <input id="f-cat" value="${esc(p.cat)}" placeholder="e.g. Brassica" oninput="editingPlant.cat=this.value">
  </div>
  <div class="frow">
    <label>Emoji icon</label>
    <input id="f-emoji" value="${esc(p.emoji)}" placeholder="🥦" oninput="editingPlant.emoji=this.value">
  </div>
</div>

<hr class="section-divider">
<div style="font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:.75rem">Planting</div>
<div class="frow"><label>Zone 6 timing</label><textarea oninput="editingPlant.planting.zone6=this.value">${esc(p.planting.zone6)}</textarea></div>
<div class="fgrid">
  <div class="frow"><label>Depth</label><input value="${esc(p.planting.depth)}" oninput="editingPlant.planting.depth=this.value"></div>
  <div class="frow"><label>Spacing</label><input value="${esc(p.planting.spacing)}" oninput="editingPlant.planting.spacing=this.value"></div>
  <div class="frow"><label>Soil pH range</label><input value="${esc(p.planting.ph)}" placeholder="6.0–7.0" oninput="editingPlant.planting.ph=this.value"></div>
  <div class="frow"><label>Sunlight</label><input value="${esc(p.planting.sun)}" oninput="editingPlant.planting.sun=this.value"></div>
</div>
<div class="frow"><label>Special instructions</label><textarea oninput="editingPlant.special=this.value">${esc(p.special||"")}</textarea></div>

<hr class="section-divider">
<div style="font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:.75rem">Water & fertilizer</div>
<div class="fgrid">
  <div class="frow"><label>Water (inches/week)</label><input value="${esc(p.water.in)}" placeholder="1–1.5" oninput="editingPlant.water.in=this.value"></div>
  <div class="frow"><label>Fertilizer type</label><input value="${esc(p.fertilizer.type)}" oninput="editingPlant.fertilizer.type=this.value"></div>
  <div class="frow"><label>Fertilizer amount</label><input value="${esc(p.fertilizer.amount)}" oninput="editingPlant.fertilizer.amount=this.value"></div>
</div>
<div class="frow"><label>Water notes</label><textarea oninput="editingPlant.water.note=this.value">${esc(p.water.note)}</textarea></div>
<div class="frow"><label>Fertilizer frequency</label><textarea oninput="editingPlant.fertilizer.freq=this.value">${esc(p.fertilizer.freq)}</textarea></div>

<hr class="section-divider">
<div style="font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:.75rem">Companions</div>
<div class="frow"><label>Good companions (comma-separated)</label><input id="f-good" value="${esc(p.companions.good.join(", "))}" oninput="editingPlant.companions.good=this.value.split(',').map(s=>s.trim()).filter(Boolean)"></div>
<div class="frow"><label>Bad companions (comma-separated)</label><input id="f-bad" value="${esc(p.companions.bad.join(", "))}" oninput="editingPlant.companions.bad=this.value.split(',').map(s=>s.trim()).filter(Boolean)"></div>
<div class="frow"><label>Distance note</label><textarea oninput="editingPlant.companionDist=this.value">${esc(p.companionDist)}</textarea></div>
<div class="frow"><label>Beneficial animals</label><textarea oninput="editingPlant.animals=this.value">${esc(p.animals)}</textarea></div>

<hr class="section-divider">
<div style="font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:.75rem">Diseases</div>
<div id="diseases-list">${p.diseases.map((d,i)=>diseaseRow(d,i)).join("")}</div>
<button class="add-row-btn" onclick="addDisease()">+ add disease</button>

<hr class="section-divider">
<div class="frow"><label>Pest control</label><textarea oninput="editingPlant.pests=this.value">${esc(p.pests)}</textarea></div>

<hr class="section-divider">
<div style="font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:.75rem">Growth stages</div>
<div id="stages-list">${p.stages.map((s,i)=>stageRow(s,i)).join("")}</div>
<button class="add-row-btn" onclick="addStage()">+ add stage</button>

<hr class="section-divider">
<div style="font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:.75rem">Crop rotation</div>
<div class="fgrid">
  <div class="frow"><label>Plant family</label><input value="${esc(p.rotation.family)}" oninput="editingPlant.rotation.family=this.value"></div>
  <div class="frow"><label>Rotation cycle</label><input value="${esc(p.rotation.cycle)}" oninput="editingPlant.rotation.cycle=this.value"></div>
</div>

<div class="factions">
  <button class="cancel-btn" onclick="cancelEdit()">Cancel</button>
  <button class="save-btn" onclick="saveEdit()">${isNew?"Add crop":"Save changes"}</button>
</div>
`;
}

function diseaseRow(d,i){
  return `<div class="stage-edit-row" id="drow-${i}">
    <input style="flex:1" placeholder="Disease name" value="${esc(d.name)}" oninput="editingPlant.diseases[${i}].name=this.value">
    <textarea style="flex:2;min-height:44px;resize:vertical;font-size:12px" placeholder="Description & treatment" oninput="editingPlant.diseases[${i}].desc=this.value">${esc(d.desc)}</textarea>
    <button class="rm-btn" onclick="removeDisease(${i})">Remove</button>
  </div>`;
}

function stageRow(s,i){
  return `<div class="stage-edit-row" id="srow-${i}">
    <input style="width:70px;flex:none" placeholder="Label" value="${esc(s.label)}" oninput="editingPlant.stages[${i}].label=this.value">
    <input style="flex:1" placeholder="Stage title" value="${esc(s.title)}" oninput="editingPlant.stages[${i}].title=this.value">
    <textarea style="flex:2;min-height:44px;resize:vertical;font-size:12px" placeholder="Description" oninput="editingPlant.stages[${i}].desc=this.value">${esc(s.desc)}</textarea>
    <button class="rm-btn" onclick="removeStage(${i})">Remove</button>
  </div>`;
}

function addDisease(){editingPlant.diseases.push({name:"",desc:""});document.getElementById("diseases-list").innerHTML=editingPlant.diseases.map(diseaseRow).join("");}
function removeDisease(i){editingPlant.diseases.splice(i,1);document.getElementById("diseases-list").innerHTML=editingPlant.diseases.map(diseaseRow).join("");}
function addStage(){editingPlant.stages.push({label:"",title:"",desc:""});document.getElementById("stages-list").innerHTML=editingPlant.stages.map(stageRow).join("");}
function removeStage(i){editingPlant.stages.splice(i,1);document.getElementById("stages-list").innerHTML=editingPlant.stages.map(stageRow).join("");}

function saveEdit(){
  if(!editingPlant.name.trim()){alert("Please enter a crop name.");return;}
  if(isNew){
    PLANTS.push(editingPlant);
  } else {
    const idx=PLANTS.findIndex(x=>x.id===editingPlant.id);
    if(idx>=0)PLANTS[idx]=editingPlant;
  }
  renderCatRow();renderGrid();
  document.getElementById("edit-modal").style.display="none";
  if(!isNew&&currentPlantId===editingPlant.id){
    document.getElementById("detail-view").style.display="block";
    document.getElementById("detail-content").innerHTML=buildDetail(editingPlant);
    showTab("planting");
  } else {
    showList();
  }
  editingPlant=null;
}

function cancelEdit(){
  editingPlant=null;
  document.getElementById("edit-modal").style.display="none";
  if(currentPlantId){
    document.getElementById("detail-view").style.display="block";
  } else {
    showList();
  }
}

function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

renderCatRow();
renderGrid();
</script>
